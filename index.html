<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>純前端待辦清單</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>我的待辦清單</h1>
        <p>純 HTML / CSS / JS 前端應用程式</p>
      </header>

      <section class="task-form-panel">
        <form id="task-form" autocomplete="off">
          <input id="task-input" type="text" placeholder="輸入新的待辦事項..." />
          <button type="submit">新增</button>
        </form>
        <div class="info-line">
          <span id="task-count">目前沒有待辦事項</span>
          <button id="clear-button" class="secondary-btn">清除已完成</button>
        </div>
      </section>

      <section class="task-list-panel">
        <ul id="task-list" class="task-list"></ul>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
